services:
  - type: web
    name: simonjcleary-website
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: simonjcleary-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_URL
        sync: false

databases:
  - name: simonjcleary-db
    plan: starter
    databaseName: simonjcleary
    version: "15"
